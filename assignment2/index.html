<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8" />
        <title>Order Custom Pizza</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="js/index.js" defer></script>
    </head>

    <body>
        <h1>Order Custom Pizza</h1>


        <div class="customer-info">
            <h3>Customer Details</h3>

            <label for="name">Name:</label>
            <input type="text" id="name"/><p>

            <label for="address">Address:</label>
            <input type="text" id="address"/><p>

            <label for="phone">Phone Number:</label>
            <input type="text" id="phone"/>
        </div>

        <div class="pizza-base">
            <h3>Choose Your Pizza Base</h3>

            <label for="size">Pizza Size:</label>
            <select id="size">
                <option value="small">Small</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
                <option value="extra-large">Extra Large</option>
            </select><p>

            <label for="crust">Crust Type:</label>
            <select id="crust">
                <option value="normal">Normal</option>
                <option value="thin">Thin</option>
                <option value="thick">Thick</option>
                <option value="stuffed">Stuffed Crust</option>
                <option value="gluten-free">Gluten Free</option>
            </select><p>

            <label for="sauce">Main Sauce:</label>
            <select id="sauce">
                <option value="tomato">Tomato Sauce</option>
                <option value="pesto">Pesto</option>
                <option value="alfredo">Creamy Alfredo</option>
                <option value="barbecue">Barbecue</option>
            </select>
        </div>

        <div class="toppings">
            <h3>Choose Your Toppings</h3>

            <input type="checkbox" id="topping" value="pepperoni"/>Pepperoni
            <input type="checkbox" id="topping" value="chicken"/>Chicken
            <input type="checkbox" id="topping" value="bacon" />Bacon
            <input type="checkbox" id="topping" value="corn" />Corn
            <input type="checkbox" id="topping" value="mushroom" />Mushrooms<p>

            <input type="checkbox" id="topping" value="onion" />Onion
            <input type="checkbox" id="topping" value="green-pepper" />Green Pepper
            <input type="checkbox" id="topping" value="black-olive" />Black Olive
            <input type="checkbox" id="topping" value="nutella" />Nutella
            <input type="checkbox" id="topping" value="fairy-dust" />Fairy Dust<p>

            <input type="checkbox" id="topping" value="tomato" />Tomato
            <input type="checkbox" id="topping" value="shrimp" />Shrimp
            <input type="checkbox" id="topping" value="fish" />Fish
            <input type="checkbox" id="topping" value="crab" />Crab
            <input type="checkbox" id="topping" value="sushi" />Sushi<p></p>

            <input type="checkbox" id="topping" value="egg" />Egg
            <input type="checkbox" id="topping" value="noodle" />Noodle
            <input type="checkbox" id="topping" value="dumpling" />Dumpling
            <input type="checkbox" id="topping" value="extra-cheese" />Extra Cheese
            <input type="checkbox" id="topping" value="pork" />Pork
        </div>
        
        <div class="extra-detail">
            <h3>Extra Details</h3>

            <label for="pizza-amount">Pizza Amounts:</label>
            <input type="numbers" id="pizza-amount"/><p>

            <label for="spice">Spice:</label>
            <select id="spice">
                <option value="no-spice">No Spice</option>
                <option value="mild">Mild</option>
                <option value="normal">Normal</option>
                <option value="hot">Hot</option>
                <option value="extra-hot">Extra Hot</option>
            </select><p>

            <label for="special-instructions">Special Instructions:</label>
            <input type="text" id="special-instructions"/><p>

            <button type="submit" id="order-button">Order Now!</button>
        </div>

        <p id="order-summary"></p>

        <p>Fahriye Derin Tuncay - 200573753</p>

    </body>
</html>
