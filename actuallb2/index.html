<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Mission Decision Machine</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="js/index.js" defer></script>

    </head>

    <body>
        <h1>Mission Decision Machine</h1>

        <div class="main-stats">
            <div class="ammo-value">
                <h3>Ammo Amount</h3>
                <p id="ammo-id" value=""></p>
            </div>

            <div class="shield-value">
                <h3>Shield Strength</h3>
                <p id="shield-id" value=""></p>
            </div>

            <div class="health-value">
                <h3>Health Levels</h3>
                <p id="health-id" value=""></p>
            </div>

            <div class="enemy-value">
                <h3>Enemy Nearby</h3>
                <p id="enemy-id" value=""></p>
            </div>

            <div class="progress-bar">
                <h3>Progress Bar</h3>
                <p id="progress-id" value=""></p>
            </div>
        </div>

        

    </body>














</html>
