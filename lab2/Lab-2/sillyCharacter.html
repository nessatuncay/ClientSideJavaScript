<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silly Character Customizer</title>
    <script src="js/sillyCharacter.js" defer>

    </script>
</head>
<body>
    <h1>Silly Character Customizer</h1>
    <p id="characterDescription"></p>
    
    <button id="generateButton">Generate Random Character</button>
    <button id="increaseAgeButton">Increase Age</button>
    <button id="decreaseAgeButton">Decrease Age</button>

    <p>
        <label for="characterName">Character Name:</label>
        <input type="text" id="characterName">
    </p>

    <p>
        <label for="age">Age:</label>
        <input type="number" id="age">
    </p>

    <p>
        <label for="isSuperhero">Is Superhero:</label>
        <input type="checkbox" id="isSuperhero">
    </p>

    <p>
        <label for="specialPowers">Special Powers:</label>
        <input type="text" id="specialPowers">

    <p>
        <label for="favoriteFood">Favorite Food:</label>
        <input type="text" id="favoriteFood">
    </p>

    
</body>
</html>
